%YAML 1.2
---
$id: http://devicetree.org/schemas/iio/imu/we,wsen-isds.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Wurth Elektronik WSEN-ISDS 6-Axis IMU (2536030320001)

description: |
  Wurth Elektronik WSEN-ISDS (order code 2536030320001) is a 6-axis
  MEMS inertial measurement unit combining:
    - 3-axis accelerometer (±2 / ±4 / ±8 / ±16 g, up to 6.664 kHz ODR)
    - 3-axis gyroscope (±125 / ±250 / ±500 / ±1000 / ±2000 dps)
    - Integrated temperature sensor (-40 °C to +85 °C)

  I²C addresses:
    0x6A  (SAO pin low)
    0x6B  (SAO pin high)

  Datasheet:
    https://www.we-online.com/components/products/datasheet/2536030320001.pdf

properties:
  compatible:
    const: we,wsen-isds-2536030320001

  reg:
    description: I2C address; 0x6A when SAO is low, 0x6B when SAO is high.
    enum: [0x6A, 0x6B]

  vdd-supply:
    description: Regulator providing VDD (1.71 V – 3.6 V)

  vddio-supply:
    description: Regulator providing VDD_IO for I/O pins (1.62 V – 3.6 V)

  interrupts:
    description: |
      Up to two interrupt lines (INT_0 and INT_1).
      INT_0 is pin 4, INT_1 is pin 9 on the LGA-14 package.
    minItems: 1
    maxItems: 2

  interrupt-names:
    description: Names for the interrupt signals.
    items:
      - const: INT_0
      - const: INT_1

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    #include <dt-bindings/interrupt-controller/irq.h>

    i2c {
        #address-cells = <1>;
        #size-cells    = <0>;

        imu@6a {
            compatible  = "we,wsen-isds-2536030320001";
            reg         = <0x6A>;
            vdd-supply  = <&vdd_3v3>;
            vddio-supply = <&vdd_3v3>;

            interrupt-parent = <&gpio1>;
            interrupts = <5 IRQ_TYPE_EDGE_RISING>;
            interrupt-names = "INT_0";
        };
    };
