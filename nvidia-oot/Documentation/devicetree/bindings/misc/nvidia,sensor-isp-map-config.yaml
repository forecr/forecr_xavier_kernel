%YAML 1.2
---
$id: http://devicetree.org/schemas/tegra-isp-map/nvidia,sensor-isp-map-config.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Nvidia Tegra Sensor-ISP Map Config

maintainers:
  - Chinniah Poosapadi

description: |
     The following nodes use this compatibility
        - /tegra-isp-map

select:
  properties:
    compatible:
        minItems: 1
        maxItems: 1
        items:
            enum:
                - nvidia,sensor-isp-map-config

  required:
    - compatible

properties:

    nvidia,isp-mapping:
        $ref: "/schemas/types.yaml#/definitions/uint32-matrix"
        items:
            minItems: 2
            maxItems: 2
            items:
                - $ref: "/schemas/types.yaml#/definitions/uint32"
                  minimum: 0x0
                  maximum: 0x11
                - $ref: "/schemas/types.yaml#/definitions/uint32"
                  minimum: 0x0
                  maximum: 0x1

required:
    - compatible

examples:
    - |
        tegra-isp-map {
            compatible = "nvidia,sensor-isp-map-config";
            nvidia,isp-mapping = <0 0>,
                                 <1 1>,
                                 <2 0>,
                                 <3 1>,
                                 <4 0>,
                                 <5 1>,
                                 <6 0>,
                                 <7 1>,
                                 <8 0>,
                                 <9 1>,
                                 <10 0>,
                                 <11 1>,
                                 <12 0>,
                                 <13 1>,
                                 <14 0>,
                                 <15 1>,
                                 <16 0>,
                                 <17 1>;
            status = "disabled";
        };
