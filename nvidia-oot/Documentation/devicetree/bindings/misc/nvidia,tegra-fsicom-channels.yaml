%YAML 1.2
---
$id: http://devicetree.org/schemas/FsiComIvc/nvidia,tegra-fsicom-channels.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: FSI Communication IVC Node

maintainers:
  - Rahul Bedarkar

description: |
     The following nodes use this compatibility
        - /FsiComIvc

select:
  properties:
    compatible:
        minItems: 1
        maxItems: 1
        items:
            enum:
                - nvidia,tegra-fsicom-channels

  required:
    - compatible

properties:

    nChannel:
        description: Number of communication channels supported
        $ref: "/schemas/types.yaml#/definitions/uint32"
        minimum: 0x1
        maximum: 0x80

    nvsciipc_endpoint:
        description: Array of NvSci IPC endpoint names supported
        $ref: "/schemas/types.yaml#/definitions/string-array"

patternProperties:
    "^channel_[0-9]+$":
        type: object
        description: Individual channel configuration properties
        properties:
            frame-count:
                description: Number of frames allocated to this channel. frame-count*frame-size should not be greater than 16U * 1024U * 1024U
                $ref: "/schemas/types.yaml#/definitions/uint32"
                minimum: 0x1
                maximum: 0x40000

            frame-size:
                description: Size of each frame in bytes. Frame size to be multiple of 64. frame-count*frame-size should not be greater than 16U * 1024U * 1024U
                $ref: "/schemas/types.yaml#/definitions/uint32"
                minimum: 0x40
                maximum: 0x800

            core-id:
                description: ID of the core this channel belongs to
                $ref: "/schemas/types.yaml#/definitions/uint32"
                minimum: 0x0
                maximum: 0x3

            notification:
                description: Notification configuration for this channel
                $ref: "/schemas/types.yaml#/definitions/string"
                enum:
                    - disabled

            NvSciCh:
                description: NvSci channel name for this channel
                $ref: "/schemas/types.yaml#/definitions/string"


required:
    - compatible

examples:
    - |
        FsiComIvc {
            compatible = "nvidia,tegra-fsicom-channels";
            status = "disabled";
            nChannel=<9>;
            nvsciipc_endpoint = "nvfsicom_EPD",
                                "nvfsicom_CcplexApp",
                                "nvfsicom_CcplexApp_state_change",
                                "nvfsicom_app1",
                                "nvfsicom_app2",
                                "nvfsicom_appGR";
            channel_0{
                frame-count = <7>;
                frame-size = <2048>;
                core-id = <0>;
                NvSciCh = "nvfsicom_EPD";
            };
            channel_1{
                frame-count = <30>;
                frame-size = <64>;
                core-id = <0>;
                NvSciCh = "nvfsicom_CcplexApp";
            };
            channel_2{
                frame-count = <4>;
                frame-size = <64>;
                core-id = <0>;
                NvSciCh = "nvfsicom_CcplexApp_state_change";
            };
            channel_3{
                frame-count = <4>;
                frame-size = <64>;
                core-id = <0>;
                NvSciCh = "nvfsicom_app1";
            };
            channel_4{
                frame-count = <2>;
                frame-size = <64>;
                core-id = <1>;
                NvSciCh = "nvfsicom_app2";
            };
            channel_5{
                frame-count = <4>;
                frame-size = <64>;
                core-id = <0>;
                NvSciCh = "nvfsicom_appGR";
            };
            channel_6{
                frame-count = <4>;
                frame-size = <1024>;
                core-id = <0>;
            };
            channel_10{
                frame-count = <4>;
                frame-size = <64>;
                core-id = <2>;
                notification = "disabled";
                NvSciCh = "nvfsicom_app3";
            };
            channel_11{
                frame-count = <4>;
                frame-size = <1024>;
                core-id = <3>;
                notification = "disabled";
                NvSciCh = "nvfsicom_app4";
            };
        };
